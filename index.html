<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Turn</title>

    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="assets/css/bootstrap-icons-1.10.5.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png">

    <!-- JS -->
    <script src="assets/js/jquery-3.6.0.min.js"></script>
    <script src="assets/js/bootstrap.bundle.js"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="#">My Turn</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <!-- PROJECT SELECT -->
                <li class="nav-item dropdown" style="margin: 0px 40px;">
                    <a id="active-project-name"
                       class="nav-link dropdown-toggle"
                       role="button"
                       data-bs-toggle="dropdown">
                        Select a Project
                    </a>
                    <ul id="project-dropdown" class="dropdown-menu"></ul>
                </li>

                <!-- SETTINGS -->
                <li class="nav-item">
                    <a id="project-settings-btn" class="nav-link">
                        <i class="bi-gear"></i>
                    </a>
                </li>

                <!-- SPIKE CONNECT -->
                <li class="nav-item">
                    <button id="connect-spike-btn" class="btn btn-success">
                        Connect SPIKE
                    </button>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- ================= APP ADMIN ================= -->
<div id="app-admin" class="section-app" style="display:none;"></div>

<!-- ================= PROJECT STEPS ================= -->
<div id="project-steps" class="section-app">

    <!-- TOP NAV -->
    <div id="step-nav-top" class="step-nav container align-items-center"></div>

    <!-- STEP TABLE -->
    <div id="step-table" class="step-table container rounded"></div>

    <!-- BOTTOM NAV -->
    <div id="step-nav-bottom" class="step-nav container align-items-center"></div>

</div>

<!-- ================= ERROR SCREEN ================= -->
<div id="project-error" class="section-app" style="display:none;"></div>

<!-- ================= SCRIPTS (IMPORTANT ORDER FIX) ================= -->

<script src="assets/js/dexie-3.2.4.js"></script>

<!-- Blockly MUST load BEFORE block-config.js -->
<script src="assets/js/blockly-9.3.3.min.js"></script>

<script src="block-config.js"></script>

<script src="main.js"></script>

</body>
</html>
